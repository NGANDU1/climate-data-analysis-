<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Climate Early Warning System</title>
    <meta name="description" content="Reset your password for Zambia Climate Early Warning System">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="templatemo-glass-admin-style.css">
    <link rel="stylesheet" href="../assets/css/gov-theme.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="background"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-page">
        <!-- Theme Toggle -->
        <button class="theme-toggle-float" id="theme-toggle" title="Toggle Light/Dark Mode">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/>
                <path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/>
                <path d="M2 12h2"/><path d="M20 12h2"/>
                <path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>

        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo" style="background: linear-gradient(135deg, #10b981, #059669); color: white;">🌦️</div>
                    <h1 class="login-title">Reset Password</h1>
                    <p class="login-subtitle">Enter your email to get a reset code</p>
                </div>

                <form id="forgot-form" style="margin-bottom: 18px;">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Reset Code</button>
                </form>

                <div id="reset-section" style="display:none;">
                    <div class="divider" style="margin: 18px 0;">
                        <span>use reset code</span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="token">Reset Code</label>
                        <input type="text" id="token" class="form-input" placeholder="Paste the reset code" required>
                        <p style="margin-top: 8px; color: var(--text-muted); font-size: 13px;">
                            For this project, the code is shown after you request it.
                        </p>
                    </div>

                    <form id="reset-form">
                        <div class="form-group">
                            <label class="form-label" for="new-password">New Password</label>
                            <input type="password" id="new-password" class="form-input" placeholder="Enter new password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Password</button>
                    </form>
                </div>

                <p class="login-footer">
                    Back to <a href="login.html" style="color: var(--emerald);">Sign in</a>
                    <br>
                    No account? <a href="register.html" style="color: var(--emerald);">Create one</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="site-footer">
            <p>Copyright © 2025 Climate Early Warning System - Zambia. All rights reserved.</p>
        </footer>
    </div>

    <script src="templatemo-glass-admin-script.js"></script>
    <script>
        (function () {
            const API_BASE = (() => {
                const params = new URLSearchParams(window.location.search);
                const override = params.get('apiBase') || window.localStorage.getItem('apiBase');
                if (override) return override.replace(/\/$/, '');

                const host = window.location.hostname;
                const port = window.location.port;
                if ((host === 'localhost' || host === '127.0.0.1') && port && port !== '5000') {
                    return 'http://localhost:5000/api';
                }
                return '/api';
            })();

            const forgotForm = document.getElementById('forgot-form');
            const resetSection = document.getElementById('reset-section');
            const resetForm = document.getElementById('reset-form');

            forgotForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = (document.getElementById('email').value || '').trim().toLowerCase();

                try {
                    const response = await fetch(`${API_BASE}/auth/forgot-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });

                    const result = await response.json().catch(() => ({}));
                    if (!response.ok || !result.success) {
                        if (result.code === 'NO_ACCOUNT') {
                            window.location.href = `register.html?email=${encodeURIComponent(email)}`;
                            return;
                        }
                        throw new Error(result.message || 'Failed to generate reset code');
                    }

                    resetSection.style.display = 'block';
                    document.getElementById('token').value = result.reset_token || '';
                    alert('Reset code generated. Paste it into the Reset Code box.');
                } catch (err) {
                    alert(err.message || 'Failed to generate reset code');
                }
            });

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = (document.getElementById('email').value || '').trim().toLowerCase();
                const token = (document.getElementById('token').value || '').trim();
                const newPassword = document.getElementById('new-password').value || '';

                try {
                    const response = await fetch(`${API_BASE}/auth/reset-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, token, new_password: newPassword })
                    });

                    const result = await response.json().catch(() => ({}));
                    if (!response.ok || !result.success) {
                        throw new Error(result.message || 'Failed to reset password');
                    }

                    alert('Password updated. Please sign in.');
                    window.location.href = `login.html?email=${encodeURIComponent(email)}`;
                } catch (err) {
                    alert(err.message || 'Failed to reset password');
                }
            });
        })();
    </script>
<script src="../assets/js/bfcache-reload.js"></script>
</body>
</html>
